<div id="tooltip"></div>

<script>
function show(event, title, desc) {
  const tt = document.getElementById('tooltip');
  tt.innerHTML = '<strong>' + title + '</strong>' + desc;
  tt.style.display = 'block';
  tt.style.left = Math.min(event.clientX + 12, window.innerWidth - 270) + 'px';
  tt.style.top = (event.clientY - 60) + 'px';
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.node-group')) {
    document.getElementById('tooltip').style.display = 'none';
  }
});
</script>

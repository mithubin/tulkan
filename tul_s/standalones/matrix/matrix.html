<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Matrix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh}
canvas{display:block}
#ctrl{position:fixed;top:12px;right:12px;z-index:100;font-family:system-ui,sans-serif;font-size:12px}
#gear{background:rgba(0,0,0,.55);border:1px solid #333;color:#0f0;width:30px;height:30px;
      border-radius:6px;cursor:pointer;font-size:15px;display:flex;align-items:center;
      justify-content:center;float:right;user-select:none}
#gear:hover{background:rgba(0,200,0,.2)}
#panel{background:rgba(8,8,8,.94);border:1px solid #222;border-radius:8px;padding:13px 15px;
       margin-top:6px;width:258px;color:#bbb;display:none;clear:both;max-height:92vh;overflow-y:auto}
.sec{color:#475569;font-size:10px;text-transform:uppercase;letter-spacing:.07em;
     margin:10px 0 7px;border-top:1px solid #1e293b;padding-top:8px}
.sec:first-child{margin-top:0;border-top:none;padding-top:0}
.row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.row label{flex:1;color:#94a3b8}
.row input[type=range]{flex:2;accent-color:#0f0;cursor:pointer}
.row input[type=color]{width:38px;height:22px;border:none;border-radius:3px;cursor:pointer;padding:1px;background:#1e293b}
.row input[type=checkbox]{accent-color:#0f0;cursor:pointer;width:14px;height:14px}
.row select{flex:2;background:#1e293b;border:1px solid #334155;color:#e2e8f0;
            border-radius:4px;padding:2px 5px;font-size:11px;cursor:pointer}
textarea{width:100%;background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:4px;
         padding:5px 7px;font-size:11px;resize:vertical;min-height:54px;font-family:inherit;margin-bottom:8px}
textarea::placeholder{color:#475569}
.cbs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.cbs label{display:flex;align-items:center;gap:3px;background:#1e293b;padding:2px 7px;
           border-radius:3px;cursor:pointer;color:#94a3b8;font-size:11px}
.cbs label:hover{background:#334155}
.cbs input{accent-color:#0f0;cursor:pointer}
.btn{background:#1e293b;border:1px solid #334155;color:#cbd5e1;padding:4px 10px;
     border-radius:4px;cursor:pointer;font-size:11px;width:100%;margin-bottom:5px}
.btn:hover{background:#334155}
.btn.rec{background:#7f1d1d;color:#fca5a5;border-color:#991b1b}
.btn.rec:hover{background:#991b1b}
.btn-row{display:flex;gap:5px;margin-bottom:5px}
.btn-row .btn{margin-bottom:0}
#rec-info{font-size:10px;color:#475569;margin-top:4px;text-align:center;min-height:14px}
.hint{font-size:10px;color:#334155;margin-bottom:6px;line-height:1.4}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ctrl">
  <div id="gear" onclick="togglePanel()" title="Einstellungen">⚙</div>
  <div id="panel">

    <div class="sec">Regen</div>
    <div class="cbs" id="cbs"></div>
    <div class="row"><label>Schriftgröße</label>
      <input type="range" id="fsize" min="8" max="48" value="16"></div>
    <div class="row"><label>Geschwindigkeit</label>
      <input type="range" id="speed" min="1" max="30" value="8"></div>
    <div class="row"><label>Rückwärts</label>
      <input type="range" id="rev" min="0" max="100" value="0"
             title="Anteil der Kolonnen, die aufwärts regnen"></div>
    <div class="row"><label>Häufigkeit</label>
      <input type="range" id="density" min="1" max="100" value="25"
             title="Wie oft eine Kolonne neu startet – niedrig = spärlich, hoch = dicht"></div>
    <div class="row"><label>Zeilenabstand</label>
      <input type="range" id="voffset" min="-6" max="32" value="0"></div>
    <div class="row"><label>Gesamtgröße</label>
      <input type="range" id="gscale" min="40" max="220" value="100" step="5" oninput="onReset()"></div>

    <div class="sec">Farbe</div>
    <div class="row"><label>Vordergrund</label>
      <input type="color" id="fg" value="#00ff41"></div>
    <div class="row"><label>Hintergrund</label>
      <input type="color" id="bg" value="#000000"></div>
    <div class="row"><label>Spur</label>
      <input type="range" id="trail" min="2" max="40" value="10"></div>
    <div class="row"><label>Deckkraft</label>
      <input type="range" id="opacity" min="20" max="100" value="90"></div>
    <div class="row"><label>Heller Kopf</label>
      <input type="checkbox" id="head" checked></div>

    <div class="sec">Verborgener Text</div>
    <textarea id="txt" placeholder="Text hier eingeben…"></textarea>
    <div class="row">
      <label>Modus</label>
      <select id="textmode" onchange="onModeChange()">
        <option value="aus">Aus</option>
        <option value="sequenz">Sequenz – Regen</option>
        <option value="wort">Wort-Regen</option>
        <option value="leuchtend">Leuchtend – Akzent</option>
        <option value="unsichtbar">Unsichtbar – gleiche Farbe</option>
      </select>
    </div>
    <!-- Akzentfarbe: sequenz, wort, leuchtend -->
    <div id="accent-row" class="row" style="display:none">
      <label>Akzentfarbe</label>
      <input type="color" id="accentcol" value="#ffe066"></div>
    <!-- Verwürfelung: nur sequenz -->
    <div id="shuffle-row" class="row" style="display:none">
      <label>Verwürfelung</label>
      <input type="range" id="shuffle" min="0" max="100" value="0"
             title="0 = korrekte Reihenfolge · 100 = vollständig durcheinander"></div>
    <!-- Häufigkeit korrekt: nur wort -->
    <div id="freq-row" class="row" style="display:none">
      <label>Korrekt-Anteil</label>
      <input type="range" id="freq" min="0" max="100" value="15"
             title="Wie viele Kolonnen zeigen das Wort in richtiger Reihenfolge"></div>
    <!-- Wort rückwärts: nur wort -->
    <div id="wrev-row" class="row" style="display:none">
      <label>Rückwärts-Anteil</label>
      <input type="range" id="wrev" min="0" max="100" value="0"
             title="Anteil der Kolonnen, die das Wort von hinten nach vorne zeigen"></div>
    <p class="hint" id="mode-hint"></p>

    <div class="sec">Entrastert</div>
    <div class="row"><label>Aktiv</label>
      <input type="checkbox" id="entrastered" onchange="rebuildJitter()"></div>
    <div class="row"><label>Versatz seitlich</label>
      <input type="range" id="jitter-x" min="0" max="20" value="6"></div>
    <div class="row"><label>Versatz Zeile</label>
      <input type="range" id="jitter-y" min="0" max="12" value="3"></div>
    <div class="row"><label>Größenvariation</label>
      <input type="checkbox" id="fsvar" checked></div>

    <div class="sec">Schrift</div>
    <div class="row">
      <label>Preset</label>
      <select id="font-preset" onchange="applyPreset()">
        <option value="'Noto Sans Mono',monospace">Noto Sans Mono</option>
        <option value="monospace">monospace (System)</option>
        <option value="'Courier New',monospace">Courier New</option>
        <option value="'DejaVu Sans Mono',monospace">DejaVu Sans Mono</option>
        <option value="'Ubuntu Mono',monospace">Ubuntu Mono</option>
        <option value="'Liberation Mono',monospace">Liberation Mono</option>
        <option value="'Fira Mono',monospace">Fira Mono</option>
        <option value="'JetBrains Mono',monospace">JetBrains Mono</option>
        <option value="'Cascadia Code',monospace">Cascadia Code</option>
        <option value="'Inconsolata',monospace">Inconsolata</option>
        <option value="'OCR A Extended',monospace">OCR A Extended</option>
        <option value="serif">serif</option>
        <option value="sans-serif">sans-serif</option>
        <option value="cursive">cursive</option>
      </select>
    </div>
    <div class="row">
      <label>Name</label>
      <input type="text" id="font-custom" placeholder="z.B. Impact"
             style="flex:2;background:#1e293b;border:1px solid #334155;color:#e2e8f0;
                    border-radius:4px;padding:3px 7px;font-size:11px"
             onchange="currentFont=this.value||currentFont">
    </div>
    <div class="row" style="align-items:flex-start">
      <label style="padding-top:3px">TTF / OTF</label>
      <div style="flex:2">
        <label style="display:inline-block;background:#1e293b;border:1px solid #334155;
                      color:#94a3b8;padding:3px 9px;border-radius:4px;cursor:pointer;font-size:11px">
          Datei wählen…
          <input type="file" accept=".ttf,.otf,.woff,.woff2" style="display:none"
                 onchange="loadFontFile(this)">
        </label>
        <div id="font-status" style="font-size:10px;color:#475569;margin-top:4px"></div>
      </div>
    </div>

    <div class="sec">Aktionen</div>
    <div class="btn-row">
      <button class="btn" onclick="toggleFullscreen()">⛶ Vollbild</button>
      <button class="btn" onclick="onReset()">↺ Neu</button>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="exportSettings()">↓ Einstellungen</button>
      <label class="btn" style="text-align:center;cursor:pointer">↑ Laden
        <input type="file" accept=".json" style="display:none" onchange="importSettings(this)">
      </label>
    </div>
    <button class="btn" id="rec-btn" onclick="toggleRec()">⏺ Video aufnehmen</button>
    <div id="rec-info"></div>
  </div>
</div>

<script>
// ── Zeichensätze ──────────────────────────────────────────────────────────
function cr(a,b){ return Array.from({length:b-a+1},(_,i)=>String.fromCodePoint(a+i)); }
const SETS=[
  {key:'katakana',   label:'Katakana',   chars:cr(0x30A1,0x30F6)},
  {key:'latin',      label:'Latein',     chars:cr(0x41,0x5A).concat(cr(0x61,0x7A))},
  {key:'digits',     label:'Ziffern',    chars:cr(0x30,0x39)},
  {key:'cyrillic',   label:'Kyrillisch', chars:cr(0x0410,0x044F)},
  {key:'greek',      label:'Griechisch', chars:cr(0x0391,0x03A9).concat(cr(0x03B1,0x03C9))},
  {key:'thai',       label:'Thai',       chars:cr(0x0E01,0x0E2E)},
  {key:'hebrew',     label:'Hebräisch',  chars:cr(0x05D0,0x05EA)},
  {key:'devanagari', label:'Devanagari', chars:cr(0x0905,0x0939)},
  {key:'arabic',     label:'Arabisch',   chars:cr(0x0627,0x0648)},
];
const cbsEl=document.getElementById('cbs');
SETS.forEach(s=>{
  const l=document.createElement('label');
  l.innerHTML=`<input type="checkbox" data-key="${s.key}" ${s.key==='katakana'||s.key==='latin'?'checked':''}> ${s.label}`;
  cbsEl.appendChild(l);
});
function activeChars(){
  const out=[];
  document.querySelectorAll('#cbs input:checked').forEach(cb=>out.push(...SETS.find(s=>s.key===cb.dataset.key).chars));
  return out.length?out:SETS[0].chars;
}

// ── Canvas & State ────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let drops=[], lastTs=0, textPos=0;
let colText=[], colJitterX=[], colJitterY=[], colFsMul=[], colReverse=[];
let currentFont="'Noto Sans Mono',monospace";

// Wort-Regen state
let colWord=[], colWordShuf=[], colCorrect=[], colBackward=[], wordIdx=0;

function getSpacing(){
  const fs=+document.getElementById('fsize').value;
  const gs=+document.getElementById('gscale').value/100;
  const vo=+document.getElementById('voffset').value;
  return {fs, colW:fs*gs, rowH:fs*gs+vo};
}
function numCols(){ return Math.max(1,Math.floor(canvas.width/getSpacing().colW)); }

function onReset(){ textPos=0; wordIdx=0; resetDrops(); }

function resetDrops(){
  const {rowH}=getSpacing();
  const n=numCols();
  const nRows=canvas.height/rowH;
  const revFrac=+document.getElementById('rev').value/100;
  colReverse=Array.from({length:n},()=>Math.random()<revFrac);
  drops=Array.from({length:n},(_,i)=>colReverse[i]
    ? nRows+Math.random()*nRows
    : Math.random()*(-(nRows)));
  colText    =new Array(n).fill(null);
  colWord    =new Array(n).fill(null);
  colWordShuf=new Array(n).fill(null);
  colCorrect =new Array(n).fill(false);
  colBackward=new Array(n).fill(false);
  rebuildJitter();
  // pre-assign words so columns start populated
  const m=document.getElementById('textmode').value;
  if(m==='wort') for(let i=0;i<n;i++) assignWord(i);
}

function rebuildJitter(){
  const n=drops.length;
  const jx=+document.getElementById('jitter-x').value;
  const on=document.getElementById('entrastered').checked;
  const fsv=document.getElementById('fsvar').checked;
  colJitterX=Array.from({length:n},()=>on?(Math.random()-.5)*jx*2:0);
  colJitterY=Array.from({length:n},()=>on?Math.random()*2*Math.PI:0);
  colFsMul  =Array.from({length:n},()=>(on&&fsv)?0.82+Math.random()*0.36:1.0);
}

window.addEventListener('resize',()=>{canvas.width=innerWidth;canvas.height=innerHeight;onReset();});
document.getElementById('fsize').addEventListener('input',onReset);

function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

// ── Text-Modi ─────────────────────────────────────────────────────────────
const HINTS={
  aus:'',
  sequenz:'Buchstaben fallen der Reihe nach. Verwürfelung 0 = exakte Reihenfolge; höher = einzelne Buchstaben springen aus dem Takt.',
  wort:   'Wörter aus dem Text fallen letterweise als Kolonnen. Die meisten zeigen das Wort durcheinander – der Korrekt-Anteil steuert, wie oft eine Kolonne das Wort lesbar zeigt.',
  leuchtend:'Buchstaben in Akzentfarbe mit Leuchten – deutlich sichtbar im Regen.',
  unsichtbar:'Gleiche Farbe wie der Regen – Sequenz ist da, aber kaum zu erahnen.',
};
function onModeChange(){
  const m=document.getElementById('textmode').value;
  document.getElementById('accent-row').style.display =['sequenz','wort','leuchtend'].includes(m)?'flex':'none';
  document.getElementById('shuffle-row').style.display=m==='sequenz'?'flex':'none';
  document.getElementById('freq-row').style.display   =m==='wort'?'flex':'none';
  document.getElementById('wrev-row').style.display   =m==='wort'?'flex':'none';
  document.getElementById('mode-hint').textContent=HINTS[m]||'';
  textPos=0; wordIdx=0; colText.fill(null);
  if(m==='wort') for(let i=0;i<colWord.length;i++) assignWord(i);
}

function getTextChars(){return[...document.getElementById('txt').value].filter(c=>c.trim()!=='');}
function getWords(){
  return document.getElementById('txt').value
    .split(/\s+/).filter(w=>w.length>0)
    .map(w=>[...w]);
}

// Verwürfelung für Sequenz: gibt nächsten (evtl. versetzten) Buchstaben zurück
function nextSeqChar(txtChars, shufFrac){
  const len=txtChars.length; if(!len) return null;
  const maxD=Math.round(shufFrac*20);  // max ±20 Positionen
  const disp=maxD?Math.round((Math.random()-.5)*2*maxD):0;
  const idx=((textPos+disp)%len+len)%len;
  textPos++;
  return txtChars[idx];
}

// Wort einer Kolonne zuweisen (Fisher-Yates wenn verwürfelt)
function assignWord(i){
  const ws=getWords(); if(!ws.length){colWord[i]=null;return;}
  const word=ws[wordIdx%ws.length]; wordIdx++;
  colWord[i]=word;
  const freq   =+document.getElementById('freq').value/100;
  const bkFrac =+document.getElementById('wrev').value/100;
  colCorrect[i] =Math.random()<freq;
  colBackward[i]=Math.random()<bkFrac;
  if(!colCorrect[i]){
    const arr=[...word];
    for(let k=arr.length-1;k>0;k--){
      const j=Math.floor(Math.random()*(k+1));
      [arr[k],arr[j]]=[arr[j],arr[k]];
    }
    colWordShuf[i]=arr;
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────
function draw(ts){
  requestAnimationFrame(draw);
  const spd=+document.getElementById('speed').value;
  if(ts-lastTs<1000/spd) return;
  lastTs=ts;

  const {fs,colW,rowH}=getSpacing();
  const trail  =+document.getElementById('trail').value;
  const opacity=+document.getElementById('opacity').value/100;
  const useHead=document.getElementById('head').checked;
  const chars  =activeChars();
  const mode   =document.getElementById('textmode').value;
  const entras =document.getElementById('entrastered').checked;
  const jy     =+document.getElementById('jitter-y').value;
  const shufFrac=+document.getElementById('shuffle').value/100;
  const revFrac   =+document.getElementById('rev').value/100;
  const densityP  =+document.getElementById('density').value/1000;
  const nRows     =canvas.height/rowH;
  const txtChars=getTextChars();
  const withAccent=['sequenz','wort','leuchtend'].includes(mode);
  const [br,bg_,bb]=hexRgb(document.getElementById('bg').value);
  const [fr,fg_,fb]=hexRgb(document.getElementById('fg').value);
  const [ar,ag_,ab]=hexRgb(document.getElementById('accentcol').value);

  // Fade overlay
  ctx.fillStyle=`rgba(${br},${bg_},${bb},${1/trail})`;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.textBaseline='top';

  drops.forEach((y,i)=>{
    const fsi =fs*(colFsMul[i]||1);
    const xPx =i*colW+(colJitterX[i]||0);
    const yPx =Math.floor(y)*rowH;
    const yOff=entras?Math.sin((colJitterY[i]||0)+y*0.4)*jy:0;
    ctx.font=`${fsi}px ${currentFont}`;

    let ch, isText=false;

    if(mode==='sequenz'||mode==='leuchtend'||mode==='unsichtbar'){
      // Einzelne Buchstaben aus Sequenz, Kolonne trägt einen Char
      if(colText[i]){ch=colText[i]; isText=true;}
      else{ch=chars[Math.floor(Math.random()*chars.length)];}

    } else if(mode==='wort'){
      // Wort-Regen: jede Kolonne zeigt Buchstaben ihres Wortes der Reihe nach
      const word=colWord[i];
      if(word&&word.length>0){
        const row=Math.floor(drops[i]);
        const fwd=((row%word.length)+word.length)%word.length;
        const pos=colBackward[i]?(word.length-1-fwd):fwd;
        ch=colCorrect[i]?word[pos]:(colWordShuf[i]?.[pos]??word[pos]);
        isText=true;
      } else {
        ch=chars[Math.floor(Math.random()*chars.length)];
      }

    } else {
      ch=chars[Math.floor(Math.random()*chars.length)];
    }

    // Leuchtend: glow + mehrfach zeichnen
    if(isText&&mode==='leuchtend'){
      ctx.shadowBlur=22; ctx.shadowColor=`rgba(${ar},${ag_},${ab},1)`;
    }
    const [cr_,cg_,cb_]=(isText&&withAccent)?[ar,ag_,ab]:[fr,fg_,fb];
    const draws=(isText&&mode==='leuchtend')?4:1;
    ctx.fillStyle=`rgba(${cr_},${cg_},${cb_},${opacity})`;
    for(let d=0;d<draws;d++) ctx.fillText(ch,xPx,yPx+yOff);
    ctx.shadowBlur=0;

    if(useHead&&yPx>=0&&yPx<canvas.height){
      ctx.fillStyle='rgba(255,255,255,0.92)';
      ctx.fillText(ch,xPx,yPx+yOff);
    }

    if(colReverse[i]) drops[i]-=1; else drops[i]+=1;
    // Kolonne erreicht Rand → neue Zuweisung + Richtung neu würfeln
    const pastEdge=colReverse[i]?(yPx<0):(yPx>canvas.height);
    if(pastEdge&&Math.random()<densityP){
      colReverse[i]=Math.random()<revFrac;
      drops[i]=colReverse[i]?(nRows+1):0;
      if((mode==='sequenz'||mode==='leuchtend'||mode==='unsichtbar')&&txtChars.length){
        colText[i]=(mode==='sequenz')
          ?nextSeqChar(txtChars,shufFrac)
          :txtChars[textPos%txtChars.length];
        if(mode!=='sequenz') textPos++;
      } else {
        colText[i]=null;
      }
      if(mode==='wort') assignWord(i);
    }
  });
}

// ── Schrift ───────────────────────────────────────────────────────────────
function applyPreset(){
  currentFont=document.getElementById('font-preset').value;
  document.getElementById('font-custom').value='';
}
function loadFontFile(input){
  const file=input.files[0];if(!file)return;
  const st=document.getElementById('font-status');
  st.textContent='lädt…';st.style.color='#475569';
  const name=file.name.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9_-]/g,'_');
  file.arrayBuffer().then(buf=>{
    const face=new FontFace(name,buf);
    return face.load().then(l=>{
      document.fonts.add(l);
      currentFont=`'${name}',monospace`;
      document.getElementById('font-custom').value=name;
      st.textContent=`✓ ${file.name}`;st.style.color='#4ade80';
    });
  }).catch(e=>{st.textContent='✗ '+e.message;st.style.color='#f87171';});
}

// ── Controls & Video ──────────────────────────────────────────────────────
function togglePanel(){
  const p=document.getElementById('panel');
  p.style.display=p.style.display==='none'?'block':'none';
}
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
document.addEventListener('keydown',e=>{
  if(e.key==='f'&&!e.ctrlKey&&!e.metaKey&&e.target.tagName!=='TEXTAREA') toggleFullscreen();
  if(e.key==='Escape') document.getElementById('panel').style.display='none';
});

let recorder=null,recChunks=[],recStart,recTimer;
function toggleRec(){
  if(recorder?.state==='recording'){
    recorder.stop();clearInterval(recTimer);
    document.getElementById('rec-btn').className='btn';
    document.getElementById('rec-btn').textContent='⏺ Video aufnehmen';
    document.getElementById('rec-info').textContent='Speichere…';
    return;
  }
  recChunks=[];recStart=Date.now();
  const stream=canvas.captureStream(30);
  const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8_000_000});
  recorder.ondataavailable=e=>e.data.size>0&&recChunks.push(e.data);
  recorder.onstop=()=>{
    const url=URL.createObjectURL(new Blob(recChunks,{type:'video/webm'}));
    Object.assign(document.createElement('a'),
      {href:url,download:`matrix_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.webm`}).click();
    URL.revokeObjectURL(url);
    document.getElementById('rec-info').textContent='Download gestartet.';
  };
  recorder.start(200);
  document.getElementById('rec-btn').className='btn rec';
  document.getElementById('rec-btn').textContent='⏹ Aufnahme stoppen';
  recTimer=setInterval(()=>{
    const s=Math.round((Date.now()-recStart)/1000);
    document.getElementById('rec-info').textContent=
      `● REC ${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },500);
}

// ── Settings Export / Import ──────────────────────────────────────────────
const SETTING_IDS=['fsize','speed','voffset','gscale','rev','density',
  'fg','bg','trail','opacity','head','txt','textmode','accentcol',
  'shuffle','freq','wrev','entrastered','jitter-x','jitter-y','fsvar',
  'font-preset','font-custom'];

function exportSettings(){
  const s={};
  SETTING_IDS.forEach(id=>{
    const el=document.getElementById(id); if(!el) return;
    s[id]=el.type==='checkbox'?el.checked:el.value;
  });
  s.charsets={};
  document.querySelectorAll('#cbs input').forEach(cb=>{s.charsets[cb.dataset.key]=cb.checked;});
  const blob=new Blob([JSON.stringify(s,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  Object.assign(document.createElement('a'),{href:url,download:'matrix_settings.json'}).click();
  URL.revokeObjectURL(url);
}

function importSettings(input){
  const file=input.files[0]; if(!file) return;
  input.value='';
  file.text().then(text=>{
    const s=JSON.parse(text);
    SETTING_IDS.forEach(id=>{
      const el=document.getElementById(id); if(!el||s[id]===undefined) return;
      if(el.type==='checkbox') el.checked=s[id];
      else el.value=s[id];
    });
    if(s.charsets) document.querySelectorAll('#cbs input').forEach(cb=>{
      if(s.charsets[cb.dataset.key]!==undefined) cb.checked=s.charsets[cb.dataset.key];
    });
    if(s['font-custom']&&s['font-custom'].trim()) currentFont=s['font-custom'];
    else if(s['font-preset']) currentFont=s['font-preset'];
    onModeChange();
    rebuildJitter();
    onReset();
  }).catch(e=>alert('Fehler beim Laden: '+e.message));
}

// ── Start ─────────────────────────────────────────────────────────────────
canvas.width=innerWidth;canvas.height=innerHeight;
onReset();
requestAnimationFrame(draw);
</script>

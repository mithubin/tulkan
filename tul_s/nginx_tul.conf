# ── tul.yourdomain.example ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name tul.yourdomain.example;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$server_name$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name tul.yourdomain.example;
    ssl_certificate     /etc/nginx/ssl/wildcard-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/wildcard-privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Docker-interner DNS — erzwingt Re-Resolution bei jedem Request (verhindert 502 nach Container-Rebuild)
    resolver 127.0.0.11 valid=10s;

    # Gemeinsame Proxy-Header (vererbt in Location-Blöcke ohne eigene proxy_set_header-Direktive)
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Korrekte Kombination für DNS-Re-Resolution + URL-Rewriting:
    # set $upstream → erzwingt DNS-Lookup; rewrite → strippt Prefix; proxy_pass http://$upstream → kein URI ersetzt $uri

    location = /popt { return 301 /popt/; }
    location /popt/ {
        set $upstream popt:5006;
        rewrite ^/popt(.*) $1 break;
        proxy_pass http://$upstream;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location = /bild { return 301 /bild/; }
    location /bild/ {
        set $upstream bild:5005;
        rewrite ^/bild(.*) $1 break;
        proxy_pass http://$upstream;
        proxy_buffering off;
    }

    location = /kurv { return 301 /kurv/; }
    location /kurv/ {
        set $upstream kurv:5008;
        rewrite ^/kurv(.*) $1 break;
        proxy_pass http://$upstream;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location = /lern { return 301 /lern/; }
    location /lern/ {
        set $upstream lern:5007;
        rewrite ^/lern(.*) $1 break;
        proxy_pass http://$upstream;
        # lern braucht eigene proxy_set_header → alle Basis-Header wiederholen
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Prefix /lern;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location = /nach { return 301 /nach/; }
    location /nach/ {
        set $upstream nach:5009;
        rewrite ^/nach(.*) $1 break;
        proxy_pass http://$upstream;
        proxy_buffering off;
    }

    location = /buch { return 301 /buch/; }
    location /buch/ {
        set $upstream buch:5011;
        rewrite ^/buch(.*) $1 break;
        proxy_pass http://$upstream;
        proxy_buffering off;
    }

    location = /kal-trel { return 301 /kal-trel/; }
    location /kal-trel/ {
        set $upstream kal-trel:5010;
        rewrite ^/kal-trel(.*) $1 break;
        proxy_pass http://$upstream;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    location = /trskr { return 301 /trskr/; }
    location /trskr/ {
        set $upstream trskr:5004;
        rewrite ^/trskr(.*) $1 break;
        proxy_pass http://$upstream;
        # trskr: WebSocket + eigene proxy_set_header → alle Basis-Header wiederholen
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location / {
        # Hub catch-all: kein Prefix zu strippen → proxy_pass ohne URI übergibt $uri unverändert
        set $upstream tul-hub:5000;
        proxy_pass http://$upstream;
        proxy_buffering off;
    }
}

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PDF-Optimierung</title>
<link rel="stylesheet" href="/static/tul-theme.css">
<style>
:root {
  --bg:     #1e1e2e;
  --bg2:    #2a2a3e;
  --bg3:    #313145;
  --acc:    #89b4fa;
  --acc2:   #a9c4fb;
  --blur:   0px;
  --surface:var(--bg2);
  --input:  var(--bg3);
  --border: #44445a;
  --text:   #cdd6f4;
  --muted:  #6c7086;
  --accent: var(--acc);
  --ok:     #a6e3a1;
  --warn:   #f9e2af;
  --err:    #f38ba8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:14px;
     display:flex;flex-direction:column;height:100vh;overflow:hidden}

header{background:var(--surface);border-bottom:1px solid var(--border);
       padding:6px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
header h1{font-size:13px;font-weight:600;flex:1;text-align:center}
header span{color:var(--muted);font-size:12px}

.main{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:310px;flex-shrink:0;border-right:1px solid var(--border);
         display:flex;flex-direction:column;overflow:hidden}
.sidebar-scroll{flex:1;overflow-y:auto;padding:12px}
.sidebar-foot{padding:10px 12px;border-top:1px solid var(--border)}

label.f{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;margin-top:10px}
label.f:first-child{margin-top:0}

/* ── Drop-Zone ── */
.drop-zone{border:2px dashed var(--border);border-radius:6px;padding:14px 12px;
           text-align:center;cursor:pointer;transition:border-color .2s,background .2s;
           margin-bottom:6px}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:#1e2a3e}
.drop-zone p{color:var(--muted);font-size:11px;margin-top:3px}
.drop-zone strong{color:var(--text);font-size:12px}
#file-input{display:none}

/* Upload-Status */
#upload-status{font-size:11px;margin-top:4px;min-height:14px}
#upload-status.ok {color:var(--ok)}
#upload-status.err{color:var(--err)}
#upload-status.run{color:var(--warn)}

/* Eingabe-Dateiliste (tul-files) */
#input-files-wrap{margin-top:8px}
.input-files-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.input-files-hdr span{font-size:11px;color:var(--muted)}
.input-files-hdr button{background:none;border:none;color:var(--muted);font-size:11px;
                         cursor:pointer;padding:0}
.input-files-hdr button:hover{color:var(--text)}
.ifl-section{display:flex;flex-direction:column;gap:2px}
.ifl-section-hdr{font-size:10px;color:var(--muted);font-weight:600;margin:6px 0 2px 6px;letter-spacing:.04em}
.ifl-row{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:3px;cursor:pointer}
.ifl-row:hover{background:var(--input)}
.ifl-row input[type=checkbox]{accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.ifl-name{flex:1;font-size:11px;color:var(--text);
          overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ifl-size{font-size:10px;color:var(--muted);flex-shrink:0}
.ifl-empty{font-size:11px;color:var(--muted);padding:4px 6px}
.ifl-sel-row{display:flex;gap:8px;margin-top:4px}
.ifl-sel-row button{background:none;border:none;color:var(--muted);
                    font-size:10px;cursor:pointer;padding:0;text-decoration:underline}
.ifl-sel-row button:hover{color:var(--text)}
.ifl-1x{font-size:9px;font-weight:700;color:var(--muted);
         border:1px solid var(--border);border-radius:2px;
         padding:0 3px;flex-shrink:0;line-height:1.5}
.ifl-mkan{font-size:9px;color:var(--acc);border:1px solid var(--acc);border-radius:2px;
          padding:0 3px;flex-shrink:0;line-height:1.5}

/* ── Presets ── */
.preset-grid{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.preset-card{background:var(--input);border:1px solid var(--border);border-radius:4px;
             padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;
             transition:border-color .15s}
.preset-card:hover{border-color:var(--accent)}
.preset-card.selected{border-color:var(--accent);background:#1e2a3e}
.preset-card input[type=radio]{accent-color:var(--accent);flex-shrink:0}
.preset-name{font-size:12px;font-weight:600}
.preset-desc{font-size:11px;color:var(--muted);margin-top:1px}

.custom-fields{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.custom-fields label.f{margin-top:0}
.custom-fields input{width:100%;background:var(--input);border:1px solid var(--border);
                     color:var(--text);border-radius:3px;padding:4px 7px;font-size:12px}

/* ── Buttons ── */
.btn-start{width:100%;background:var(--accent);border:none;color:#fff;
           border-radius:5px;padding:9px;font-size:14px;cursor:pointer;font-weight:600}
.btn-start:hover{filter:brightness(1.12)}
.btn-start:disabled{opacity:.4;cursor:not-allowed}
.btn-stop{width:100%;background:#3a1a1a;border:1px solid #703030;color:#e08080;
          border-radius:5px;padding:9px 13px;font-size:13px;cursor:pointer;font-weight:600;margin-top:6px}
.btn-stop:hover{background:#4a2020}
.btn-dl{width:100%;background:transparent;border:1px solid var(--border);color:var(--text);
        border-radius:5px;padding:9px;font-size:13px;cursor:pointer;font-weight:600;margin-top:6px}
.btn-dl:hover{border-color:var(--muted)}

.errbox{background:#2a1e1e;border:1px solid var(--err);color:var(--err);
        border-radius:4px;padding:6px 8px;font-size:12px;margin-bottom:8px}
.hidden{display:none!important}

/* ── Log ── */
.log-area{flex:1;display:flex;flex-direction:column;padding:12px;overflow:hidden}
.log-area label{font-size:11px;color:var(--muted);margin-bottom:4px}
#log{flex:1;background:var(--input);border:1px solid var(--border);color:var(--text);
     border-radius:4px;padding:8px;font-family:monospace;font-size:12px;
     resize:none;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <a href="/" class="hdr-btn" style="text-decoration:none" title="Zurück zum Panel-Hub">← Panel</a>
  </div>
  <h1>PDF-Optimierung</h1>
</header>

<div class="main">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-scroll">

      <!-- Upload → tul-files Eingabe -->
      <label class="f">PDF hochladen</label>
      <div class="drop-zone" id="drop-zone">
        <strong>Klicken oder Dateien hierher ziehen</strong>
        <p>PDF oder ZIP mit PDFs — wird in Dateiverwaltung gespeichert</p>
      </div>
      <input type="file" id="file-input" accept=".pdf,.zip" multiple>
      <div id="upload-status"></div>

      <!-- Eingabe-Dateien: eigene + mkan-Pool -->
      <div id="input-files-wrap">
        <div class="input-files-hdr">
          <span>Eingabe-Dateien</span>
          <button onclick="loadInputFiles()" title="Aktualisieren">↺</button>
        </div>
        <div class="ifl-section-hdr">Eigene</div>
        <div id="own-file-list" class="ifl-section"><div class="ifl-empty">Wird geladen …</div></div>
        <div class="ifl-section-hdr" id="mkan-hdr" style="display:none">🔗 aus mkan</div>
        <div id="mkan-file-list" class="ifl-section"></div>
        <div class="ifl-sel-row">
          <button onclick="selectAll(true)">Alle</button>
          <button onclick="selectAll(false)">Keine</button>
        </div>
      </div>

      <!-- Qualität -->
      <label class="f" style="margin-top:12px">Qualitätsstufe</label>
      <div class="preset-grid">
        <label class="preset-card" onclick="selectPreset('screen')">
          <input type="radio" name="quality" value="screen">
          <div><div class="preset-name">screen <span style="color:var(--muted);font-weight:400">→ _os</span></div>
               <div class="preset-desc">72 dpi · Web-Ansicht · kleinste Datei</div></div>
        </label>
        <label class="preset-card" onclick="selectPreset('ebook')">
          <input type="radio" name="quality" value="ebook">
          <div><div class="preset-name">ebook <span style="color:var(--muted);font-weight:400">→ _oe</span></div>
               <div class="preset-desc">150 dpi · Standard E-Book</div></div>
        </label>
        <label class="preset-card selected" onclick="selectPreset('200dpi')">
          <input type="radio" name="quality" value="200dpi" checked>
          <div><div class="preset-name">200 dpi <span style="color:var(--muted);font-weight:400">→ _o2</span>
                 &nbsp;<span style="color:var(--ok);font-size:11px">Standard</span></div>
               <div class="preset-desc">bester Kompromiss · Lesen &amp; Drucken</div></div>
        </label>
        <label class="preset-card" onclick="selectPreset('printer')">
          <input type="radio" name="quality" value="printer">
          <div><div class="preset-name">printer <span style="color:var(--muted);font-weight:400">→ _op</span></div>
               <div class="preset-desc">300 dpi · Druckqualität</div></div>
        </label>
        <label class="preset-card" onclick="selectPreset('prepress')">
          <input type="radio" name="quality" value="prepress">
          <div><div class="preset-name">prepress <span style="color:var(--muted);font-weight:400">→ _opp</span></div>
               <div class="preset-desc">300 dpi CMYK · professioneller Druck</div></div>
        </label>
        <label class="preset-card" onclick="selectPreset('custom')">
          <input type="radio" name="quality" value="custom">
          <div><div class="preset-name">custom <span style="color:var(--muted);font-weight:400">→ _ocm</span></div>
               <div class="preset-desc">eigene Einstellungen</div></div>
        </label>
      </div>

      <div id="custom-wrap" class="hidden">
        <div class="custom-fields">
          <div><label class="f">Farbbild dpi</label><input type="text" id="c-color" value="200"></div>
          <div><label class="f">Graustufen dpi</label><input type="text" id="c-gray" value="200"></div>
          <div><label class="f">Mono dpi</label><input type="text" id="c-mono" value="400"></div>
          <div><label class="f">JPEG Qualität</label><input type="text" id="c-jpeg" value="86"></div>
        </div>
      </div>

    </div><!-- /sidebar-scroll -->

    <div class="sidebar-foot">
      <div id="err-box" class="errbox hidden"></div>
      <button class="btn-start" id="btn-start" onclick="startJob()" disabled>▶ Optimierung starten</button>
      <button class="btn-stop hidden" id="btn-stop" onclick="stopJob()">■ Abbrechen</button>
      <button class="btn-dl hidden" id="btn-dl" onclick="downloadResult()">⬇ Ergebnis herunterladen</button>
    </div>
  </div>

  <!-- Log -->
  <div class="log-area">
    <label>Ausgabe</label>
    <textarea id="log" readonly></textarea>
  </div>

</div>

<script>
const _B = window._B||'';
let jobId = null;
let es    = null;

// ── Preset ────────────────────────────────────────────────────────────────────
function selectPreset(v) {
  document.querySelectorAll('.preset-card').forEach(c => c.classList.remove('selected'));
  const r = document.querySelector(`input[name=quality][value="${v}"]`);
  if (r) { r.checked = true; r.closest('.preset-card').classList.add('selected'); }
  document.getElementById('custom-wrap').classList.toggle('hidden', v !== 'custom');
}

function showErr(msg) {
  const el = document.getElementById('err-box');
  el.textContent = msg;
  el.classList.toggle('hidden', !msg);
}

function setUploadStatus(msg, cls='') {
  const el = document.getElementById('upload-status');
  el.textContent = msg;
  el.className = cls;
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

// ── Drop Zone → tul-files upload ─────────────────────────────────────────────
const _dz = document.getElementById('drop-zone');
const _fi = document.getElementById('file-input');

_dz.addEventListener('click', () => _fi.click());
_dz.addEventListener('dragover', e => { e.preventDefault(); _dz.classList.add('over'); });
_dz.addEventListener('dragleave', e => { if (!_dz.contains(e.relatedTarget)) _dz.classList.remove('over'); });
_dz.addEventListener('drop', e => { e.preventDefault(); _dz.classList.remove('over'); handleFiles(e.dataTransfer.files); });
_fi.addEventListener('change', e => { handleFiles(e.target.files); e.target.value = ''; });

async function handleFiles(files) {
  if (!files || !files.length) return;
  setUploadStatus('Wird hochgeladen …', 'run');
  let ok = 0, fail = 0;
  for (const f of files) {
    const fd = new FormData();
    fd.append('file', f);
    fd.append('category', 'input');
    fd.append('retention', 'task');  // onetimeuse: nach Verarbeitung gelöscht
    try {
      const r = await fetch(_B + '/files/upload', { method: 'POST', body: fd });
      if (r.ok) ok++; else fail++;
    } catch { fail++; }
  }
  if (fail) setUploadStatus(`${ok} hochgeladen, ${fail} fehlgeschlagen`, 'err');
  else      setUploadStatus(`✓ ${ok} Datei(en) · wird nach Verarbeitung gelöscht`, 'ok');
  await loadInputFiles();
}

// ── Eingabe-Dateiliste: eigene + mkan-Pool ────────────────────────────────────
async function loadInputFiles() {
  // eigene tul-files
  try {
    const r = await fetch(_B + '/files?category=input');
    renderOwnList(r.ok ? await r.json() : []);
  } catch {
    document.getElementById('own-file-list').innerHTML =
      '<div class="ifl-empty">Fehler beim Laden.</div>';
  }
  // mkan-Pool: via Hub-Route /api/mkan-pool, gefiltert durch excl-Prefs
  try {
    const poolResp = await fetch('/api/mkan-pool');
    const poolData = poolResp.ok ? await poolResp.json() : null;
    let excluded = new Set();
    try {
      const pr = await fetch(_B + '/prefs/excl-mkan');
      if (pr.ok) { const a = await pr.json(); if (Array.isArray(a)) excluded = new Set(a); }
    } catch {}
    const pdfs = (poolData?.pool || [])
      .flatMap(c => (c.files || [])
        .filter(f => f.mime === 'application/pdf' || /\.pdf$/i.test(f.name || ''))
        .map(f => ({ ...f, cardTitle: c.card_title })))
      .filter(f => !excluded.has(f.id));
    renderMkanList(pdfs);
  } catch {
    document.getElementById('mkan-file-list').innerHTML = '';
    document.getElementById('mkan-hdr').style.display = 'none';
  }
}

function renderOwnList(files) {
  const el = document.getElementById('own-file-list');
  if (!files.length) {
    el.innerHTML = '<div class="ifl-empty">Noch keine eigenen Dateien — PDF hochladen.</div>';
    updateStartBtn();
    return;
  }
  el.innerHTML = '';
  files.forEach(f => {
    const row = document.createElement('label');
    row.className = 'ifl-row';
    const onetimeuse = f.retention === 'task';
    row.innerHTML =
      `<input type="checkbox" class="file-check" data-src="own" value="${f.id}" onchange="onSelChange()">` +
      (onetimeuse ? `<span class="ifl-1x" title="Onetimeuse — wird nach Verarbeitung gelöscht">1×</span>` : '') +
      `<span class="ifl-name" title="${f.filename}">${f.filename}</span>` +
      `<span class="ifl-size">${fmtSize(f.size)}</span>`;
    el.appendChild(row);
    if (window.tulFiles?.attachPreview) tulFiles.attachPreview(row, f.id, f.filename, f.mime || 'application/pdf', false);
  });
  updateStartBtn();
}

function renderMkanList(files) {
  const el  = document.getElementById('mkan-file-list');
  const hdr = document.getElementById('mkan-hdr');
  if (!files.length) {
    el.innerHTML = '';
    hdr.style.display = 'none';
    updateStartBtn();
    return;
  }
  hdr.style.display = '';
  el.innerHTML = '';
  files.forEach(f => {
    const row = document.createElement('label');
    row.className = 'ifl-row';
    const label = f.cardTitle ? `${f.cardTitle}: ${f.name}` : f.name;
    row.innerHTML =
      `<input type="checkbox" class="file-check" data-src="mkan" value="${f.id}" onchange="onSelChange()">` +
      `<span class="ifl-mkan" title="aus mkan">mk</span>` +
      `<span class="ifl-name" title="${label}">${f.name}</span>` +
      `<span class="ifl-size">${f.size ? fmtSize(f.size) : ''}</span>`;
    el.appendChild(row);
    if (window.tulFiles?.attachPreview) tulFiles.attachPreview(row, f.id, f.name, f.mime || 'application/pdf', true);
  });
  updateStartBtn();
}

function selectAll(state) {
  document.querySelectorAll('.file-check').forEach(cb => cb.checked = state);
  onSelChange();
}

function onSelChange() {
  updateStartBtn();
  if (typeof tulFiles !== 'undefined') {
    const ids = [...document.querySelectorAll('.file-check[data-src="own"]:checked')].map(cb => cb.value);
    tulFiles.markActive(ids);
  }
}

function updateStartBtn() {
  const any = document.querySelectorAll('.file-check:checked').length > 0;
  document.getElementById('btn-start').disabled = !any;
}

// ── Job ───────────────────────────────────────────────────────────────────────
function startJob() {
  const file_ids     = [...document.querySelectorAll('.file-check[data-src="own"]:checked')].map(cb => cb.value);
  const mkan_att_ids = [...document.querySelectorAll('.file-check[data-src="mkan"]:checked')].map(cb => cb.value);
  if (!file_ids.length && !mkan_att_ids.length) { showErr('Bitte mindestens eine Datei wählen.'); return; }
  showErr('');
  document.getElementById('log').value = '';
  document.getElementById('btn-dl').classList.add('hidden');

  const quality = document.querySelector('input[name=quality]:checked').value;
  const body = { file_ids, mkan_att_ids, quality };
  if (quality === 'custom') {
    body.custom_color_res = document.getElementById('c-color').value;
    body.custom_gray_res  = document.getElementById('c-gray').value;
    body.custom_mono_res  = document.getElementById('c-mono').value;
    body.custom_jpeg_q    = document.getElementById('c-jpeg').value;
  }

  setBusy(true);
  fetch(_B + '/start', { method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body) })
    .then(r => r.json())
    .then(d => {
      if (d.error) { showErr(Array.isArray(d.error) ? d.error.join('\n') : d.error); setBusy(false); return; }
      jobId = d.job_id;
      openStream(jobId);
    })
    .catch(e => { showErr('Verbindungsfehler: ' + e.message); setBusy(false); });
}

function stopJob() {
  if (jobId) fetch(_B + '/stop/' + jobId, { method: 'POST' });
  if (es) { es.close(); es = null; }
  setBusy(false);
}

function openStream(id) {
  if (es) es.close();
  es = new EventSource(_B + '/stream/' + id);
  const log = document.getElementById('log');
  es.onmessage = async e => {
    const d = JSON.parse(e.data);
    if (d.t === 'log') {
      log.value += d.m;
      log.scrollTop = log.scrollHeight;
    } else if (d.t === 'done') {
      es.close(); es = null;
      setBusy(false);
      document.getElementById('btn-dl').classList.remove('hidden');
      if (typeof tulFiles !== 'undefined') tulFiles.markActive([]);
      await loadInputFiles();
      if (typeof tulFiles !== 'undefined') tulFiles.refresh();
    }
  };
  es.onerror = () => { if (es) { es.close(); es = null; } setBusy(false); };
}

function downloadResult() {
  if (!jobId) return;
  const a = document.createElement('a');
  a.href = _B + '/download/' + jobId;
  a.download = '';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function setBusy(b) {
  if (!b) updateStartBtn();
  else document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').classList.toggle('hidden', !b);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadInputFiles();
</script>
<script src="/static/tul-theme.js"></script>
<script>
window.TUL_HELP = {
  title: 'popt – PDF-Optimierung',
  sections: [
    {
      heading: 'Dateien eingeben',
      items: [
        'PDF per Drag & Drop hochladen <em>oder</em> über <strong>DV</strong>-Button aus Datei-Verwaltung auswählen.',
        'mkan-Karten-Tab im DV-Modal: PDF direkt aus einer mkan-Karte übernehmen.',
        'Mehrere Dateien gleichzeitig wählbar – werden als Batch verarbeitet.',
      ]
    },
    {
      heading: 'Profil wählen',
      items: [
        '<strong>screen</strong> – stark komprimiert, für Web/E-Mail',
        '<strong>ebook</strong> – mittlere Qualität, gute Balance',
        '<strong>printer</strong> – druckfähige Qualität',
        '<strong>prepress</strong> – höchste Qualität, für Druckereien',
      ]
    },
    {
      heading: 'Verarbeitung',
      steps: [
        'Profil wählen, dann <strong>Optimieren</strong> klicken.',
        'Fortschritt wird als Log-Stream angezeigt.',
        'Abbruch jederzeit über den Stop-Button.',
        'Ergebnis herunterladen <em>oder</em> per DV in NC/mkan weiterreichen.',
      ]
    },
    {
      heading: 'Datei-Verwaltung (DV)',
      text: 'DV-Button in der Kopfzeile öffnet das vollständige Verwaltungs-Modal: Eingabe-Dateien, NC-Upload (Ausgabe direkt in Nextcloud), mkan-Card-Tabs für Karten-Dateien.'
    },
  ]
};
  tulTheme.init({
    subpath: _B,
    preset:  tulTheme.PRESETS.popt,
  });
</script>
<script src="/static/tul-files.js"></script>
<script>
tulFiles.init({
  subpath:  _B,
  tool:     'popt',
  onChange: loadInputFiles,
  ncEnabled: true,
  onWire: async (srcId, entry) => {
    tulFiles.close();
    setUploadStatus('Wird aus mkan importiert …', 'run');
    try {
      const r = await fetch('/api/mkan-file?att_id=' + encodeURIComponent(entry.id));
      if (!r.ok) throw new Error('mkan ' + r.status);
      const blob = await r.blob();
      const fd = new FormData();
      fd.append('file', blob, entry.name);
      fd.append('category', 'input');
      fd.append('retention', 'task');
      const r2 = await fetch(_B + '/files/upload', { method: 'POST', body: fd });
      if (!r2.ok) throw new Error('Upload-Fehler ' + r2.status);
      setUploadStatus('✓ ' + entry.name + ' importiert', 'ok');
      await loadInputFiles();
    } catch (e) {
      setUploadStatus('Fehler: ' + e.message, 'err');
    }
  },
});
</script>
</body>

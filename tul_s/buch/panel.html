<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>buch</title>
<script>
const _B = window._B||'';
</script>
<link rel="stylesheet" href="/static/tul-theme.css">
<style>
:root {
  --bg:#1a1814; --bg2:#221e18; --bg3:#2a2520;
  --acc:#c09050; --acc2:#d0a870; --blur:0px;
  --border:#38302a; --text:#ddd8c8; --muted:#7a6a58;
  --tile-w: 140px;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font: 14px/1.5 system-ui, sans-serif;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── Header ── */
header {
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px; height: 42px;
  background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.hdr-left { display: flex; align-items: center; gap: 6px; }
.hdr-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 4px; padding: 3px 10px; cursor: pointer;
  font-size: 12px; white-space: nowrap; text-decoration: none; display: inline-block;
}
.hdr-btn:hover { color: var(--text); border-color: var(--acc); }
header h1 { flex: 1; text-align: center; font-size: 14px; font-weight: 600; letter-spacing: .04em; }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Quellen-Panel ── */
.sources {
  width: 220px; min-width: 140px; max-width: 360px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; resize: horizontal;
}
.src-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 50px; }
.src-section-hd {
  padding: 3px 8px; font-size: 9px; text-transform: uppercase; letter-spacing: .1em;
  color: var(--muted); flex-shrink: 0; border-bottom: 1px solid var(--border);
}
.src-divider {
  height: 5px; background: var(--border); flex-shrink: 0; cursor: ns-resize;
  transition: background .15s;
}
.src-divider:hover { background: var(--acc); }
.src-scroll { flex: 1; overflow-y: auto; padding: 6px 8px; }
.src-doc {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 6px; margin-bottom: 3px; cursor: pointer; transition: border-color .15s;
}
.src-doc:hover { border-color: var(--acc); }
.src-doc-name { font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.src-doc-meta { font-size: 8px; color: var(--muted); margin-top: 1px; }
.src-empty { font-size: 10px; color: var(--muted); padding: 4px 0; }

/* ── Workspace ── */
.workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.ws-toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ws-toolbar label { font-size: 11px; color: var(--muted); }
.ws-toolbar input[type=range] { width: 80px; accent-color: var(--acc); cursor: pointer; }
.ws-sep { flex: 1; }
.ws-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 4px; padding: 3px 9px; cursor: pointer; font-size: 12px;
}
.ws-btn:hover { color: var(--text); border-color: var(--acc); }

.ws-pages {
  flex: 1; display: flex; flex-wrap: wrap; gap: 12px;
  padding: 14px; align-content: flex-start; overflow-y: auto;
}
.ws-empty {
  width: 100%; display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 13px; min-height: 200px;
}

/* ── Tiles ── */
.ws-tile { display: flex; flex-direction: column; align-items: center; cursor: grab; user-select: none; }
.ws-tile img {
  width: var(--tile-w); height: auto; display: block;
  border: 2px solid var(--border); border-radius: 3px; background: var(--bg3);
}
.ws-blank {
  width: var(--tile-w); aspect-ratio: 210/297;
  background: #f0ede8; border: 2px solid var(--border); border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  color: #aaa; font-size: 10px;
}
.ws-tile.drag-over img, .ws-tile.drag-over .ws-blank { border-color: var(--acc); }
.ws-tile.dragging { opacity: .3; }
.ws-tile-bar {
  display: flex; gap: 1px; margin-top: 4px;
}
.ws-tile-bar button {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 3px; line-height: 1;
}
.ws-tile-bar button:hover { color: var(--text); background: var(--bg3); }
.ws-tile-bar .rm-btn:hover { color: #f38ba8; }
.ws-tile-num { font-size: 9px; color: var(--muted); margin-top: 2px; }

/* ── Footer ── */
.ws-footer {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.ws-title-inp {
  flex: 1; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); border-radius: 4px; padding: 5px 9px; font-size: 13px;
}
.ws-title-inp:focus { outline: none; border-color: var(--acc); }
.export-btn {
  padding: 6px 18px; background: var(--acc); color: #1a1510;
  border: none; border-radius: 4px; cursor: pointer; font: 600 13px system-ui;
  white-space: nowrap;
}
.export-btn:disabled { opacity: .35; cursor: default; }
.ws-status { font-size: 11px; color: var(--muted); white-space: nowrap; }
.ws-status.ok  { color: #5abf5a; }
.ws-status.err { color: #f38ba8; }
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <a href="/" class="hdr-btn">← Panel</a>
  </div>
  <h1>buch</h1>
</header>

<div class="layout">

  <!-- ── Quellen ── -->
  <div class="sources">
    <div class="src-section" id="src-bild">
      <div class="src-section-hd">Von bild</div>
      <div class="src-scroll" id="src-scroll-bild"></div>
    </div>
    <div class="src-divider" id="src-divider"></div>
    <div class="src-section" id="src-own">
      <div class="src-section-hd">Eigene</div>
      <div class="src-scroll" id="src-scroll-own"></div>
    </div>
  </div>

  <!-- ── Workspace ── -->
  <div class="workspace">
    <div class="ws-toolbar">
      <label>Größe</label>
      <input type="range" min="80" max="300" value="140" oninput="setTileSize(this.value)">
      <span class="ws-sep"></span>
      <button class="ws-btn" onclick="addBlank()">+ Leerseite</button>
      <button class="ws-btn" onclick="clearWs()">Leeren</button>
    </div>
    <div class="ws-pages" id="ws-pages">
      <div class="ws-empty" id="ws-empty">← Dokument aus Quellen antippen</div>
    </div>
    <div class="ws-footer">
      <input class="ws-title-inp" id="ws-title" type="text" value="Bilderbuch" placeholder="Titel">
      <button class="export-btn" id="export-btn" onclick="doExport()" disabled>PDF exportieren</button>
      <span class="ws-status" id="ws-status"></span>
    </div>
  </div>

</div>

<script src="/static/tul-theme.js"></script>
<script src="/static/tul-files.js"></script>
<script>
// _B defined in <head>

let _bild    = [];   // [{rel, display, size}]
let _own     = [];   // [{id, filename, size, mime}]  (from tul-files /files)
let _pages   = [];   // [{uid, source, ref, page, rotate, w, h}]
let _uid     = 0;
let _dragIdx = null;
let _dirty   = false;

const THUMB_SIZE = 280;  // server renders at this size; CSS scales display

// ── Hilfsfunktionen ───────────────────────────────────────────────────────────

function fmtSize(b) {
  if (!b) return '';
  return b < 1024 * 1024 ? (b / 1024).toFixed(0) + ' KB' : (b / 1024 / 1024).toFixed(1) + ' MB';
}

function thumbUrl(p) {
  if (p.source === 'blank') return '';
  const base = p.source === 'bild'
    ? `${_B}/thumb?source=bild&path=${encodeURIComponent(p.ref)}`
    : `${_B}/thumb?source=own&id=${encodeURIComponent(p.ref)}`;
  return `${base}&page=${p.page}&size=${THUMB_SIZE}&rotate=${p.rotate}`;
}

// ── Quellen ───────────────────────────────────────────────────────────────────

async function loadBildFiles() {
  try {
    const r   = await fetch(_B + '/api/bild-files');
    const all = r.ok ? await r.json() : [];
    _bild = all.filter(f => f.listed !== 0 && f.listed !== false);
  } catch { _bild = []; }
  renderBildSources();
}

async function loadOwnFiles() {
  try {
    const r = await fetch(_B + '/files?category=input&all=1');
    const all = r.ok ? await r.json() : [];
    _own = all.filter(f =>
      f.listed !== 0 &&
      ((f.mime || '').includes('pdf') || (f.filename || '').toLowerCase().endsWith('.pdf'))
    );
  } catch { _own = []; }
  renderOwnSources();
}

function renderBildSources() {
  const el = document.getElementById('src-scroll-bild');
  if (!el) return;
  if (!_bild.length) {
    el.innerHTML = '<div class="src-empty">Keine PDFs aus bild</div>';
    return;
  }
  el.innerHTML = _bild.map((f, i) =>
    `<div class="src-doc" onclick="importDoc('bild',${i})" title="${f.display}">
      <div class="src-doc-name">${f.display}</div>
      <div class="src-doc-meta">${fmtSize(f.size)}</div>
    </div>`
  ).join('');
}

function renderOwnSources() {
  const el = document.getElementById('src-scroll-own');
  if (!el) return;
  if (!_own.length) {
    el.innerHTML = '<div class="src-empty">Keine eigenen PDFs — per DV hochladen</div>';
    return;
  }
  el.innerHTML = _own.map((f, i) =>
    `<div class="src-doc" onclick="importDoc('own',${i})" title="${f.filename}">
      <div class="src-doc-name">${f.filename}</div>
      <div class="src-doc-meta">${fmtSize(f.size)}</div>
    </div>`
  ).join('');
}

// ── Import ────────────────────────────────────────────────────────────────────

async function importDoc(source, idx) {
  const f = (source === 'bild' ? _bild : _own)[idx];
  if (!f) return;
  const params = source === 'bild'
    ? `source=bild&path=${encodeURIComponent(f.rel)}`
    : `source=own&id=${encodeURIComponent(f.id)}`;
  try {
    const r = await fetch(`${_B}/api/import?${params}`);
    if (!r.ok) { const j = await r.json().catch(()=>({})); alert(j.error||'Fehler'); return; }
    const data = await r.json();
    data.pages.forEach(p => _pages.push({ uid: _uid++, source: p.source, ref: p.ref, page: p.page, rotate: 0, w: p.w, h: p.h }));
    renderWs();
  } catch (e) { alert('Fehler: ' + e.message); }
}

// ── Workspace ─────────────────────────────────────────────────────────────────

function setTileSize(v) {
  document.documentElement.style.setProperty('--tile-w', v + 'px');
}

function addBlank() {
  _pages.push({ uid: _uid++, source: 'blank', ref: '', page: 0, rotate: 0, w: 595, h: 842 });
  renderWs();
}

function clearWs() {
  if (_pages.length && !confirm('Alle Seiten entfernen?')) return;
  _pages = [];
  renderWs();
}

function rotatePage(uid, delta) {
  const p = _pages.find(p => p.uid === uid);
  if (!p) return;
  p.rotate = ((p.rotate + delta) + 360) % 360;
  // Nur diesen Tile aktualisieren (kein full re-render nötig)
  const img = document.querySelector(`.ws-tile[data-uid="${uid}"] img`);
  if (img) img.src = thumbUrl(p);
}

function removePage(uid) {
  _pages = _pages.filter(p => p.uid !== uid);
  renderWs();
}

function dupPage(uid) {
  const idx = _pages.findIndex(p => p.uid === uid);
  if (idx < 0) return;
  _pages.splice(idx + 1, 0, { ..._pages[idx], uid: _uid++ });
  renderWs();
}

function renderWs() {
  _dirty = _pages.length > 0;
  const pagesEl = document.getElementById('ws-pages');
  const emptyEl = document.getElementById('ws-empty');
  document.getElementById('export-btn').disabled = _pages.length === 0;

  if (_pages.length === 0) {
    pagesEl.innerHTML = '';
    pagesEl.appendChild(emptyEl);
    emptyEl.style.display = '';
    return;
  }
  emptyEl.style.display = 'none';

  pagesEl.innerHTML = '';
  _pages.forEach((p, i) => {
    const tile = document.createElement('div');
    tile.className   = 'ws-tile';
    tile.draggable   = true;
    tile.dataset.uid = p.uid;

    const mediaHtml = p.source === 'blank'
      ? `<div class="ws-blank">leer</div>`
      : `<img src="${thumbUrl(p)}" alt="S.${i+1}" loading="lazy">`;

    tile.innerHTML = `
      ${mediaHtml}
      <div class="ws-tile-bar">
        <button onclick="rotatePage(${p.uid},-90)" title="Links drehen">↺</button>
        <button onclick="rotatePage(${p.uid},90)"  title="Rechts drehen">↻</button>
        <button onclick="dupPage(${p.uid})"         title="Duplizieren">⧉</button>
        <button class="rm-btn" onclick="removePage(${p.uid})" title="Entfernen">✕</button>
      </div>
      <div class="ws-tile-num">${i + 1}</div>`;

    tile.addEventListener('dragstart', () => { _dragIdx = i; tile.classList.add('dragging'); });
    tile.addEventListener('dragend',   () => {
      _dragIdx = null;
      document.querySelectorAll('.ws-tile').forEach(t => t.classList.remove('dragging', 'drag-over'));
    });
    tile.addEventListener('dragover',  e => {
      e.preventDefault();
      if (_dragIdx !== null && _dragIdx !== i) tile.classList.add('drag-over');
    });
    tile.addEventListener('dragleave', () => tile.classList.remove('drag-over'));
    tile.addEventListener('drop',      e => {
      e.preventDefault();
      tile.classList.remove('drag-over');
      if (_dragIdx === null || _dragIdx === i) return;
      const item = _pages.splice(_dragIdx, 1)[0];
      _pages.splice(i, 0, item);
      renderWs();
    });

    pagesEl.appendChild(tile);
  });
  pagesEl.appendChild(emptyEl);  // ws-empty bleibt im DOM (display:none)
}

// ── Export ────────────────────────────────────────────────────────────────────

async function doExport() {
  const btn    = document.getElementById('export-btn');
  const status = document.getElementById('ws-status');
  const title  = document.getElementById('ws-title').value.trim() || 'Bilderbuch';
  btn.disabled = true;
  status.className = 'ws-status'; status.textContent = 'Wird erstellt…';
  try {
    const r = await fetch(_B + '/merge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, pages: _pages.map(p => ({ source: p.source, ref: p.ref, page: p.page, rotate: p.rotate })) }),
    });
    if (!r.ok) {
      const j = await r.json().catch(()=>({}));
      status.className = 'ws-status err'; status.textContent = j.error || 'Fehler';
    } else {
      const blob = await r.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = title + '.pdf';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      status.className = 'ws-status ok'; status.textContent = `"${title}.pdf" bereit.`;
      _dirty = false;
      if (window.tulFiles) tulFiles.refresh();
    }
  } catch {
    status.className = 'ws-status err'; status.textContent = 'Netzwerkfehler';
  }
  btn.disabled = _pages.length === 0;
}

// ── DV-Wire: Datei aus externem DV-Tab in Workspace importieren ───────────────
async function importRef(source, ref) {
  const params = source === 'bild'
    ? `source=bild&path=${encodeURIComponent(ref)}`
    : `source=own&id=${encodeURIComponent(ref)}`;
  try {
    const r = await fetch(`${_B}/api/import?${params}`);
    if (!r.ok) { const j = await r.json().catch(()=>({})); alert(j.error||'Import fehlgeschlagen'); return; }
    const data = await r.json();
    data.pages.forEach(p => _pages.push({ uid: _uid++, source: p.source, ref: p.ref, page: p.page, rotate: 0, w: p.w, h: p.h }));
    renderWs();
  } catch (e) { alert('Fehler: ' + e.message); }
}

// ── Init ──────────────────────────────────────────────────────────────────────

// ── Drag-Divider Resize ───────────────────────────────────────────────────────
(function() {
  const divider = document.getElementById('src-divider');
  const secBild = document.getElementById('src-bild');
  const secOwn  = document.getElementById('src-own');
  let _resizing = false, _startY = 0, _startBH = 0;
  divider.addEventListener('mousedown', e => {
    _resizing = true; _startY = e.clientY; _startBH = secBild.offsetHeight;
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!_resizing) return;
    const total = secBild.offsetHeight + secOwn.offsetHeight;
    const newH  = Math.max(40, Math.min(total - 40, _startBH + e.clientY - _startY));
    secBild.style.flex = 'none';
    secBild.style.height = newH + 'px';
    secOwn.style.flex = '1';
    secOwn.style.height = '';
  });
  document.addEventListener('mouseup', () => {
    _resizing = false; document.body.style.userSelect = '';
  });
})();

window.TUL_HELP = {
  title: 'buch – PDF-Shuffle',
  sections: [
    {
      heading: 'Quellen',
      items: [
        '<strong>Eigene PDFs</strong> – über DV-Button hochladen; erscheinen als auswählbare Quelle.',
        '<strong>bild-Ausgaben</strong> – von bild exportierte Bilder/PDFs direkt übernehmen.',
        'Seiten aus mehreren Quellen beliebig kombinieren.',
      ]
    },
    {
      heading: 'Workspace',
      items: [
        'Seite einfügen: Quelle auswählen, dann auf Seitenkachel klicken.',
        'Reihenfolge per Drag & Drop ändern.',
        'Seite drehen: Pfeil-Buttons an der Kachel.',
        'Leere Seite einfügen: <strong>+ Leer</strong>-Button.',
        'Kachelgröße per Schieberegler anpassen.',
      ]
    },
    {
      heading: 'Export & DV',
      steps: [
        '<strong>PDF exportieren</strong>: alle Seiten in der gewählten Reihenfolge zu einer PDF zusammenstellen.',
        'Ergebnis lädt automatisch herunter <em>und</em> erscheint in DV-Ausgabe.',
        'DV-Button → NC-Tab: Ausgabe direkt in Nextcloud hochladen.',
        'DV → mkan-Karten: exportiertes PDF an mkan-Karte weiterreichen (→ mkan Chip auf Karte).',
      ]
    },
    {
      heading: 'Hinweise',
      warn: '⚠ Nicht gespeicherte Seiten gehen beim Verlassen der Seite verloren — der Browser zeigt eine Warnung. Export erst abschließen.'
    },
  ]
};
tulTheme.init({ subpath: _B, preset: tulTheme.PRESETS.buch });
window.addEventListener('beforeunload', e => {
  if (_dirty) { e.preventDefault(); e.returnValue = ''; }
});

// ← Panel-Link: eigener Confirm wenn Workspace belegt
const _panelLink = document.querySelector('.hdr-left .hdr-btn');
if (_panelLink) {
  _panelLink.addEventListener('click', e => {
    if (_dirty && !confirm('Der Workspace hat ungesicherte Seiten – trotzdem verlassen?')) {
      e.preventDefault();
    }
  });
}

tulFiles.init({
  subpath: _B,
  tool: 'buch',
  ncEnabled: true,
  recycleOutput: 'copy',
  accept: 'application/pdf,.pdf',
  onChange: () => { loadOwnFiles(); loadBildFiles(); },
  externalSources: [
    {
      id: 'bild',
      label: 'bild-A',
      url: _B + '/api/bild-files',
      toEntry: f => ({
        id:         f.rel,
        name:       f.display,
        size:       f.size,
        file_id:    f.file_id   || null,
        listed:     f.listed !== 0 && f.listed !== false,
        listed_url: f.file_id ? _B + '/api/bild-listed' : null,
      }),
    },
  ],
  onWire: (srcId, entry) => {
    importRef(srcId, entry.id);
    tulFiles.close();
  },
});
loadBildFiles();
loadOwnFiles();
</script>
</body>
</html>

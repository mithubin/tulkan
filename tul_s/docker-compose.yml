services:
  trskr:
    build:
      context: ..
      dockerfile: tools_nuc/Dockerfile.trskr
    container_name: trskr
    expose:
      - "5004"
    volumes:
      - /mnt/tul/trskr/models:/app/trscrplate_mls
      - /mnt/tul/trskr/output:/data/output
      - /mnt/tul/trskr/files:/data/tul_files
      - /mnt/tul/db:/tul_data/db
    env_file:
      - .env
    environment:
      - DOCKER=1
      - SUBPATH=/trskr
      - PORT=5004
      - OUTPUT_DIR=/data/output
      - FILES_ROOT=/data/tul_files
      - TUL_DB_PATH=/tul_data/db/tul.sqlite
      - TUL_SECRET=${TUL_SECRET:?TUL_SECRET muss in .env gesetzt sein}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
    networks:
      - webproxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',5004),2); s.close()"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s

  popt:
    build:
      context: ..
      dockerfile: tools_nuc/Dockerfile.popt
    container_name: popt
    expose:
      - "5006"
    volumes:

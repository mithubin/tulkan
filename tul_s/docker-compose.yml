      - TUL_SECRET=${TUL_SECRET:?TUL_SECRET muss in .env gesetzt sein}
      - TUL_BRIDGE_SECRET=${TUL_BRIDGE_SECRET:-}
      - MKAN_URL=http://mkan:8000
    networks:
      - webproxy
    restart: unless-stopped

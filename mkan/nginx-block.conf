# Einzufügen in ~/nexcloc/nginx.conf auf dem NUC
# Danach: docker exec nexcloc_nginx_1 nginx -s reload

upstream mkan { server mkan:8000; }

server {
    listen 80;
    server_name mkan.yourdomain.example;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$server_name$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name mkan.yourdomain.example;
    ssl_certificate     /etc/nginx/ssl/mkan-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/mkan-privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 1G;

    location / {
        proxy_pass http://mkan;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # SSE: kein Buffering, langer Timeout
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}

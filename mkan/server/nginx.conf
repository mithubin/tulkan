events {}

http {
    client_max_body_size 50M;

    upstream app {
        server app:8000;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE: kein Buffering, langer Timeout
            proxy_read_timeout 3600;
            proxy_buffering off;
            proxy_cache off;
        }
    }

    # HTTPS-Block aktivieren sobald Zertifikate vorliegen
